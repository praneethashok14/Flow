<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flow</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── Sidebar ── -->
  <aside id="sidebar">

    <!-- macOS traffic-light safe area + window drag region -->
    <div id="titlebar" data-tauri-drag-region></div>

    <div id="tab-list">
      <!-- Tab items injected by main.js -->
    </div>

    <!-- New-tab button -->
    <button id="new-tab-btn" title="New tab">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round">
        <line x1="10" y1="4" x2="10" y2="16"/>
        <line x1="4"  y1="10" x2="16" y2="10"/>
      </svg>
    </button>

    <!-- Drag handle on the right edge -->
    <div id="resize-handle"></div>

  </aside>

  <!-- ── Main column ── -->
  <div id="main-column">

    <nav id="nav-bar">

      <!-- Back -->
      <button id="back-btn" class="nav-btn" title="Back">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12.5 5L7.5 10l5 5"/>
        </svg>
      </button>

      <!-- Forward -->
      <button id="forward-btn" class="nav-btn" title="Forward">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M7.5 5l5 5-5 5"/>
        </svg>
      </button>

      <!-- Reload -->
      <button id="reload-btn" class="nav-btn" title="Reload">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15.5 4.5A7.5 7.5 0 1 1 8 2.6"/>
          <polyline points="12.5 2 15.5 4.5 13 7.5"/>
        </svg>
      </button>

      <!-- Omnibox -->
      <div id="address-wrap">
        <svg id="lock-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="4" y="9" width="12" height="9" rx="2"/>
          <path d="M7 9V6.5a3 3 0 0 1 6 0V9"/>
        </svg>
        <input id="address-bar" type="url" placeholder="Search or enter web address"
               spellcheck="false" autocomplete="off" />
      </div>

    </nav>

    <!-- Placeholder occupied by the child webview in Rust -->
    <div id="content-area"></div>

  </div>

  <script src="main.js"></script>
</body>
</html>
